[build]
  command = "pnpm install --frozen-lockfile && pnpm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"
  NPM_FLAGS = "--dry-run"
  VITE_CONVEX_URL = "https://reminiscent-wolf-254.convex.cloud"

# Cache control for assets with hash
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cache for index.html
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA fallback - serve index.html for all routes (files that exist are served first)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
