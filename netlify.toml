[build]
  command = "bun install && bun run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "18"
  BUN_VERSION = "1.3.3"
  NPM_FLAGS = "--dry-run"
  VITE_CONVEX_URL = "https://reminiscent-wolf-254.convex.cloud"

# Cache control for assets with hash
[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

# No cache for index.html
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# SPA fallback - only for non-file routes (no file extension)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

# Ensure assets are served directly
[[redirects]]
  from = "/assets/*"
  to = "/assets/:splat"
  status = 200
