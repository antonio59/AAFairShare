name: Fallow

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fallow:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"

      - name: Install dependencies
        run: bun install

      - name: Run Fallow
        uses: fallow-rs/fallow@v2
        with:
          format: annotations
          changed-since: origin/main
          fail-on-issues: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
