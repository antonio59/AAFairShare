name: CI

on:
  push:
    branches: [main, fix/vulnerabilities]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - name: Install dependencies
        run: bun install
      - name: Lint
        run: bun run lint
      - name: Typecheck
        run: bunx --bun tsc --noEmit
      - name: Test
        run: bun test
      - name: Build
        run: bun run build
