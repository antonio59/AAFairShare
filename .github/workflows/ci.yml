name: CI

on:
  push:
    branches: [main, fix/vulnerabilities]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Enable pnpm via corepack
        run: corepack enable pnpm
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: pnpm
      - name: Install dependencies
        run: ppnpm install
      - name: Lint
        run: pnpm run lint
      - name: Typecheck
        run: pnpm exec tsc --noEmit
      - name: Install Bun (for test runner)
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "latest"
      - name: Test
        run: bun test
      - name: Build
        run: pnpm run build
